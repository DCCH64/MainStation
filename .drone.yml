kind: pipeline
name: deploy

platform:
  os: linux
  arch: arm64

steps:
- name: "install dependencies"
  image: ubuntu
  commands:
    - apt-get install -y git g++ make build-essential
    - git clone https://github.com/WiringPi/WiringPi.git && cd WiringPi && ./build
- name: "build MainStation"
  image: ubuntu
  commands:
    - make